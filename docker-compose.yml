
services:
  neo4j_db:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/tesis123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p tesis123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_seeder:
    build:
      context: ./backend
    environment:
      - NEO4J_URI=bolt://neo4j_db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tesis123
    command: python scripts/graph_builder.py
    depends_on:
      neo4j_db:
        condition: service_healthy 

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j_db:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=tesis123
    depends_on:
      neo4j_db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5183:80"
    depends_on:
      - backend

volumes:
  neo4j_data: